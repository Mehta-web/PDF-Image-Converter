      function parsePages(pageText, totalPages) {
        if (!pageText.trim()) return Array.from({ length: totalPages }, (_, i) => i + 1);
        const pages = new Set();
        pageText.split(",").forEach((part) => {
          const trimmed = part.trim();
          if (!trimmed) return;
          const [startText, endText] = trimmed.split("-").map((value) => Number(value.trim()));
          if (Number.isFinite(startText) && Number.isFinite(endText)) {
            const start = Math.max(1, Math.min(startText, endText));
            const end = Math.min(totalPages, Math.max(startText, endText));
            for (let page = start; page <= end; page += 1) pages.add(page);
          } else if (Number.isFinite(startText) && startText >= 1 && startText <= totalPages) {
            pages.add(startText);
          }
        });
        return [...pages].sort((a, b) => a - b);
      }

      function saveBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
      }

      function readAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function loadImage(dataUrl) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = dataUrl;
        });
      }

      function imageToPdfData(image, imageQuality) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d", { alpha: false });
        const maxSide = 2400;
        const scale = Math.min(1, maxSide / Math.max(image.naturalWidth || image.width, image.naturalHeight || image.height));
        canvas.width = Math.max(1, Math.round((image.naturalWidth || image.width) * scale));
        canvas.height = Math.max(1, Math.round((image.naturalHeight || image.height) * scale));
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        return {
          dataUrl: canvas.toDataURL("image/jpeg", imageQuality / 100),
          width: canvas.width,
          height: canvas.height,
        };
      }

      function prettyBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }

      function loadSavedReviews() {
        try {
          if (typeof localStorage === "undefined") return [];
          const saved = localStorage.getItem("pdf-image-converter-reviews");
          return saved ? JSON.parse(saved) : [];
        } catch (error) {
          return [];
        }
      }

      function App() {
        const fileInputRef = useRef(null);
        const [dragging, setDragging] = useState(false);
        const [files, setFiles] = useState([]);
        const [mode, setMode] = useState("images-pdf");
        const [quality, setQuality] = useState(90);
        const [compression, setCompression] = useState("balanced");
        const [pageRange, setPageRange] = useState("");
        const [progress, setProgress] = useState(0);
        const [status, setStatus] = useState("Ready for PDF, JPG, and PNG files.");
        const [busy, setBusy] = useState(false);
        const [sortImagesByFilename, setSortImagesByFilename] = useState(true);
        const [userRating, setUserRating] = useState(0);
        const [reviewName, setReviewName] = useState("");
        const [reviewText, setReviewText] = useState("");
        const [visitorReviews, setVisitorReviews] = useState(loadSavedReviews);
        const [ratingMessage, setRatingMessage] = useState("");

        useEffect(() => {
          try {
            localStorage.setItem("pdf-image-converter-reviews", JSON.stringify(visitorReviews));
          } catch (error) {
            return;
          }
        }, [visitorReviews]);

        const acceptedHint = useMemo(() => {
          if (mode === "pdf-jpg") return "Drop one PDF to export JPG images";
          if (mode === "pdf-png") return "Drop one PDF to export PNG images";
          return "Drop multiple JPG or PNG files to create one PDF";
        }, [mode]);

        function chooseFiles(nextFiles) {
          const incomingFiles = [...nextFiles];
          const hasPdf = incomingFiles.some((file) => file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf"));
          const hasImage = incomingFiles.some((file) => file.type.startsWith("image/") || /\.(jpe?g|png)$/i.test(file.name));
          const targetMode = hasImage && !hasPdf ? "images-pdf" : mode;
          if (targetMode !== mode) setMode(targetMode);

          const list = incomingFiles.filter((file) => {
            const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
            const isImage = file.type.startsWith("image/") || /\.(jpe?g|png)$/i.test(file.name);
            return targetMode.startsWith("pdf") ? isPdf : isImage;
          });
          setFiles(targetMode.startsWith("pdf") ? list.slice(0, 1) : list);
          setProgress(0);
          setStatus(list.length ? `${list.length} file${list.length > 1 ? "s" : ""} selected.` : "Choose a supported file type for the selected tool.");
        }

        async function convertPdfToImages() {
          if (!window.pdfjsLib || !window.JSZip) throw new Error("Conversion libraries are still loading. Please try again.");
          const file = files[0];
          const outputType = mode === "pdf-jpg" ? "image/jpeg" : "image/png";
          const extension = mode === "pdf-jpg" ? "jpg" : "png";
          const data = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data }).promise;
          const pages = parsePages(pageRange, pdf.numPages);
          if (!pages.length) throw new Error("Enter a valid PDF page selection.");
          const zip = new JSZip();
          const created = [];

          for (let index = 0; index < pages.length; index += 1) {
            const pageNumber = pages[index];
            setStatus(`Rendering page ${pageNumber} of ${pdf.numPages}...`);
            const page = await pdf.getPage(pageNumber);
            const viewport = page.getViewport({ scale: compression === "small" ? 1.5 : 2 });
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: context, viewport }).promise;
            const blob = await new Promise((resolve) => canvas.toBlob(resolve, outputType, quality / 100));
            const name = `${file.name.replace(/\.pdf$/i, "")}-page-${pageNumber}.${extension}`;
            created.push({ blob, name });
            zip.file(name, blob);
            setProgress(Math.round(((index + 1) / pages.length) * 100));
          }

          if (created.length === 1) {
            saveBlob(created[0].blob, created[0].name);
            setStatus("Image downloaded. Temporary output has been cleared.");
            return;
          }

          setStatus("Packaging images into a ZIP file...");
          const zipBlob = await zip.generateAsync({ type: "blob" });
          saveBlob(zipBlob, "pdf-image-converter-output.zip");
          setStatus(`ZIP downloaded with ${created.length} images. Temporary output has been cleared.`);
        }

        async function convertImagesToPdf() {
          if (!jsPDF) throw new Error("PDF library is still loading. Please try again.");
          const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "a4", compress: compression !== "quality" });
          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();
          const margin = 28;

          const orderedFiles = sortImagesByFilename
            ? [...files].sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()))
            : files;

          for (let index = 0; index < orderedFiles.length; index += 1) {
            setStatus(`Adding image ${index + 1} of ${orderedFiles.length}...`);
            const file = orderedFiles[index];

            const dataUrl = await readAsDataUrl(file);
            const image = await loadImage(dataUrl);
            const pdfImage = imageToPdfData(image, quality);

            if (index > 0) pdf.addPage();

            const availableWidth = pageWidth - margin * 2;
            const availableHeight = pageHeight - margin * 2;
            const ratio = Math.min(availableWidth / pdfImage.width, availableHeight / pdfImage.height);
            const width = pdfImage.width * ratio;
            const height = pdfImage.height * ratio;
            const x = (pageWidth - width) / 2;
            const y = (pageHeight - height) / 2;

            pdf.addImage(
              pdfImage.dataUrl,
              "JPEG",
              x,
              y,
              width,
              height,
              undefined,
              compression === "small" ? "FAST" : "MEDIUM"
            );

            setProgress(Math.round(((index + 1) / orderedFiles.length) * 100));
          }

          pdf.save("converted-images.pdf");
          setStatus(`PDF downloaded with ${orderedFiles.length} image${orderedFiles.length > 1 ? "s" : ""}. Temporary output has been cleared.`);
        }

        async function handleConvert() {
          if (!files.length || busy) return;
          try {
            setBusy(true);
            setProgress(4);
            if (mode.startsWith("pdf")) await convertPdfToImages();
            else await convertImagesToPdf();
            setProgress(100);
          } catch (error) {
            setStatus(error.message || "Conversion failed. Please try another file.");
          } finally {
            setBusy(false);
          }
        }

        function clearFiles() {
          setFiles([]);
          setProgress(0);
          setStatus("Ready for PDF, JPG, and PNG files.");
          if (fileInputRef.current) fileInputRef.current.value = "";
        }

        function submitReview(event) {
          event.preventDefault();
          const cleanReview = reviewText.trim();
          if (!userRating || !cleanReview) {
            setRatingMessage("Please choose a rating and write a short review.");
            return;
          }

          const review = {
            id: Date.now(),
            name: reviewName.trim() || "Website visitor",
            rating: userRating,
            text: cleanReview,
          };

          setVisitorReviews([review, ...visitorReviews].slice(0, 6));
          setReviewName("");
          setReviewText("");
          setUserRating(0);
          setRatingMessage("Thanks. Your rating and review are now shown on the website.");
        }

        return (
          <main className="app">
            <nav className="nav">
              <div className="container nav-inner">
                <a className="brand" href="#top" aria-label="PDF Image Converter home">
                  <span className="brand-mark"><FileIcon /></span>
                  <span>PDF Image Converter</span>
                </a>
                <div className="nav-links">
                  <a href="#features">Features</a>
                  <a href="#tools">Tools</a>
                  <a href="#faq">FAQ</a>
                </div>
              </div>
            </nav>

            <header className="hero" id="top">
              <div className="container hero-grid">
                <div>
                  <span className="eyebrow"><ShieldIcon /> Free, secure, browser-based conversion</span>
                  <h1>Convert PDF to Image & Image to PDF Instantly</h1>
                  <p className="hero-copy">
                    A fast online converter for students, office workers, freelancers, and anyone who needs clean JPG,
                    PNG, and PDF output without signups, watermarks, or limits.
                  </p>
                  <div className="hero-actions">
                    <button className="btn btn-primary" type="button" onClick={() => fileInputRef.current?.click()}>
                      <UploadIcon /> Upload Files
                    </button>
                    <a className="btn btn-secondary" href="#tools">
                      <FileIcon /> View Tools
                    </a>
                  </div>
                  <div className="trust-row">
                    <span><BoltIcon /> Fast processing</span>
                    <span><ShieldIcon /> Auto-clear output</span>
                    <span><DownloadIcon /> Instant downloads</span>
                  </div>
                </div>

                <div className="converter-panel" aria-label="File converter">
                  <div
                    className={`dropzone ${dragging ? "active" : ""}`}
                    onDragOver={(event) => {
                      event.preventDefault();
                      setDragging(true);
                    }}
                    onDragLeave={() => setDragging(false)}
                    onDrop={(event) => {
                      event.preventDefault();
                      setDragging(false);
                      chooseFiles(event.dataTransfer.files);
                    }}
                  >
                    <div>
                      <div className="upload-icon"><UploadIcon /></div>
                      <h2>{acceptedHint}</h2>
                      <p>Drag and drop files here, or browse from your device.</p>
                      <button className="btn btn-primary" type="button" onClick={() => fileInputRef.current?.click()}>
                        Select Files
                      </button>
                      <input
                        ref={fileInputRef}
                        className="file-input"
                        type="file"
                        multiple={!mode.startsWith("pdf")}
                        accept={mode.startsWith("pdf") ? "application/pdf,.pdf" : "image/png,image/jpeg,.png,.jpg,.jpeg"}
                        onChange={(event) => chooseFiles(event.target.files)}
                      />
                    </div>
                  </div>

                  <div className="controls">
                    <div className="control">
                      <label htmlFor="mode">Conversion tool</label>
                      <select
                        id="mode"
                        value={mode}
                        onChange={(event) => {
                          setMode(event.target.value);
                          clearFiles();
                        }}
                      >
                        <option value="pdf-jpg">PDF to JPG</option>
                        <option value="pdf-png">PDF to PNG</option>
                        <option value="images-pdf">JPG / PNG to PDF</option>
                      </select>
                    </div>
                    <div className="control">
                      <label htmlFor="compression">Compression</label>
                      <select id="compression" value={compression} onChange={(event) => setCompression(event.target.value)}>
                        <option value="balanced">Balanced</option>
                        <option value="quality">High quality</option>
                        <option value="small">Smaller file</option>
                      </select>
                    </div>
                    <div className="control">
                      <label htmlFor="quality">Image quality: {quality}%</label>
                      <input
                        id="quality"
                        type="range"
                        min="50"
                        max="100"
                        value={quality}
                        onChange={(event) => setQuality(Number(event.target.value))}
                      />
                    </div>
                    <div className="control">
                      <label htmlFor="pages">PDF page selection</label>
                      <input
                        id="pages"
                        type="text"
                        placeholder="All pages or 1-3,5"
                        value={pageRange}
                        onChange={(event) => setPageRange(event.target.value)}
                        disabled={!mode.startsWith("pdf")}
                      />
                    </div>

                    <div className="control full" style={{ display: mode === "images-pdf" ? "flex" : "none" }}>
                      <label htmlFor="sort-images">Image order</label>
                      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <input
                          id="sort-images"
                          type="checkbox"
                          checked={sortImagesByFilename}
                          onChange={(event) => setSortImagesByFilename(event.target.checked)}
                        />
                        <span style={{ color: "var(--muted)", fontWeight: 800 }}>
                          Sort by filename (recommended)
                        </span>
                      </div>
                    </div>
                  </div>

                  {files.length > 0 && (
                    <div className="file-list">
                      {files.map((file, index) => (
                        <div className="file-item" key={`${file.name}-${index}`}>
                          <span>{file.name}</span>
                          <small>{prettyBytes(file.size)}</small>
                        </div>
                      ))}
                    </div>
                  )}

                  <div className="progress-wrap" aria-label="Conversion progress">
                    <div className="progress-meta">
                      <span>Progress</span>
                      <span>{progress}%</span>
                    </div>
                    <div className="progress-track">
                      <div className="progress-bar" style={{ "--value": `${progress}%` }} />
                    </div>
                  </div>

                  <p className="status">{status}</p>
                  <div className="panel-actions">
                    <button className="btn btn-primary" type="button" disabled={!files.length || busy} onClick={handleConvert}>
                      <DownloadIcon /> {busy ? "Converting..." : "Convert & Download"}
                    </button>
                    <button className="btn btn-secondary" type="button" onClick={clearFiles}>
                      Clear
                    </button>
                  </div>
                </div>
              </div>
            </header>

            <section id="features">
              <div className="container">
                <div className="section-head">
                  <h2>Premium conversion tools without the friction</h2>
                  <p>Everything is focused on a simple workflow: upload files, tune output settings, and download instantly.</p>
                </div>
                <div className="grid features-grid">
                  {features.map(([title, text, icon]) => (
                    <article className="card" key={title}>
                      <div className="icon-box">{icon}</div>
                      <h3>{title}</h3>
                      <p>{text}</p>
                    </article>
                  ))}
                </div>
              </div>
            </section>

            <section>
              <div className="container">
                <div className="section-head">
                  <h2>How it works</h2>
                  <p>A direct three-step process for batch conversion, mobile uploads, and high-quality output.</p>
                </div>
                <div className="steps">
                  <div className="step"><h3>Upload File</h3><p>Drop PDFs, JPGs, or PNGs into the converter and review your selected files.</p></div>
                  <div className="step"><h3>Convert</h3><p>Pick output type, quality, compression, and page range before processing.</p></div>
                  <div className="step"><h3>Download</h3><p>Save a single PDF, individual image, or ZIP archive for multi-page exports.</p></div>
                </div>
              </div>
            </section>

            <section id="tools">
              <div className="container">
                <div className="section-head">
                  <h2>Tools included</h2>
                  <p>Use focused converters for everyday document, scan, portfolio, assignment, and invoice workflows.</p>
                </div>
                <div className="grid tools-grid">
                  {tools.map(([title, text]) => (
                    <article className="card" key={title}>
                      <div className="icon-box"><FileIcon /></div>
                      <h3>{title}</h3>
                      <p>{text}</p>
                    </article>
                  ))}
                </div>
              </div>
            </section>

            <section>
              <div className="container">
                <div className="section-head">
                  <h2>Loved by quick-moving users</h2>
                  <p>Built for people who need dependable conversion during real work, not another complicated dashboard.</p>
                </div>
                <div className="grid testimonials-grid">
                  {testimonials.map(([name, role, quote]) => (
                    <article className="card" key={name}>
                      <div className="rating">5 / 5 rating</div>
                      <p>{quote}</p>
                      <h3 style={{ marginTop: 18 }}>{name}</h3>
                      <p>{role}</p>
                    </article>
                  ))}
                </div>
                <div className="rating-box" aria-label="Rate PDF Image Converter">
                  <h3>Rate and review this tool</h3>
                  <p>Share your rating and write a short review. Your review will appear below.</p>
                  <form className="review-form" onSubmit={submitReview}>
                    <div className="rating-options" aria-label="Choose rating">
                      {[1, 2, 3, 4, 5].map((value) => (
                        <button
                          className={`rating-option ${userRating === value ? "active" : ""}`}
                          type="button"
                          key={value}
                          aria-label={`Rate ${value} out of 5`}
                          onClick={() => {
                            setUserRating(value);
                            setRatingMessage("");
                          }}
                        >
                          {value}
                        </button>
                      ))}
                    </div>
                    <div className="review-field">
                      <label htmlFor="review-name">Name</label>
                      <input
                        id="review-name"
                        type="text"
                        placeholder="Your name"
                        value={reviewName}
                        onChange={(event) => setReviewName(event.target.value)}
                      />
                    </div>
                    <div className="review-field">
                      <label htmlFor="review-text">Review</label>
                      <textarea
                        id="review-text"
                        placeholder="Write your experience with this converter"
                        value={reviewText}
                        onChange={(event) => setReviewText(event.target.value)}
                      />
                    </div>
                    <button className="btn btn-primary" type="submit">
                      Submit Review
                    </button>
                  </form>
                  <div className="rating-message" role="status">{ratingMessage}</div>
                </div>
                {visitorReviews.length > 0 && (
                  <div className="grid testimonials-grid submitted-reviews" aria-label="Submitted user reviews">
                    {visitorReviews.map((review) => (
                      <article className="card review-card" key={review.id}>
                        <div className="rating">{review.rating} / 5 rating</div>
                        <p>{review.text}</p>
                        <h3>{review.name}</h3>
                        <p>Visitor review</p>
                      </article>
                    ))}
                  </div>
                )}
              </div>
            </section>

            <section id="faq">
              <div className="container">
                <div className="section-head">
                  <h2>FAQ</h2>
                  <p>Clear answers for privacy, pricing, and device support.</p>
                </div>
                <div className="grid faq-grid">
                  {faqs.map(([question, answer]) => (
                    <article className="card" key={question}>
                      <h3>{question}</h3>
                      <p>{answer}</p>
                    </article>
                  ))}
                </div>
              </div>
            </section>

            <footer className="footer">
              <div className="container footer-inner">
                <div className="brand">
                  <span className="brand-mark"><FileIcon /></span>
                  <span>PDF Image Converter</span>
                </div>
                <div className="footer-links">
                  <a href="#">Privacy Policy</a>
                  <a href="#">Terms of Service</a>
                  <a href="mailto:hello@pdfimageconverter.example"></a>
                  <a href="#"></a>
                  <a href="#"></a>
                </div>
              </div>
            </footer>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
